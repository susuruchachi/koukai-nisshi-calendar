<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>航海日誌 — VoyageLog</title>

<!-- PWA: アプリとしてインストールするための設定 -->
<link rel="manifest" href="./manifest.json" />
<meta name="theme-color" content="#131E29" />
<link rel="icon" href="./icons/icon-32.png" sizes="32x32" type="image/png" />
<link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png" />
<link rel="apple-touch-icon" href="./icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="航海日誌" />

<!-- React / Babel(ブラウザ上でJSXをコンパイル) / Tailwind -->
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  html, body { margin: 0; padding: 0; background: #131E29; }
</style>
</head>
<body>
<div id="root"></div>

<!--
  読み込み順が依存関係になっています。ファイルを追加・分割する場合は
  この順序を崩さないよう注意してください:
    constants → date-utils → recurrence → ics-export → calendar-grid → icons → VoyageLog
-->
<script type="text/babel" data-presets="react" src="./constants.js"></script>
<script type="text/babel" data-presets="react" src="./date-utils.js"></script>
<script type="text/babel" data-presets="react" src="./recurrence.js"></script>
<script type="text/babel" data-presets="react" src="./ics-export.js"></script>
<script type="text/babel" data-presets="react" src="./calendar-grid.js"></script>
<script type="text/babel" data-presets="react" src="./icons.jsx"></script>
<script type="text/babel" data-presets="react" src="./VoyageLog.jsx"></script>

<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById('root')).render(<VoyageLog />);
</script>

<!-- Service Worker登録(オフライン対応 & インストール要件を満たすため) -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch((err) => {
        console.warn('Service Worker の登録に失敗しました:', err);
      });
    });
  }
</script>
</body>
</html>
